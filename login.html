<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IE-LMS — ログイン</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #1e1b4b; font-family: sans-serif;
    }
    .card {
      background: #fff; border-radius: 16px; padding: 48px 36px;
      width: 340px; text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,.4);
    }
    .icon { font-size: 40px; margin-bottom: 12px; }
    h1 { font-size: 22px; color: #1e1b4b; margin-bottom: 6px; }
    p  { font-size: 13px; color: #6b7280; margin-bottom: 28px; }
    input {
      width: 100%; padding: 12px 14px; font-size: 14px;
      border: 2px solid #e5e7eb; border-radius: 10px;
      text-align: left; outline: none;
    }
    input:focus { border-color: #7c3aed; }
    button {
      margin-top: 14px; width: 100%; padding: 13px;
      background: #7c3aed; color: #fff; border: none;
      border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer;
    }
    button:hover { background: #6d28d9; }
    .err { margin-top: 10px; font-size: 13px; color: #ef4444; min-height: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🏭</div>
    <h1>IE-LMS</h1>
    <p>登録済みのメールアドレスを入力してください</p>
    <input type="email" id="email" placeholder="example@email.com" autofocus>
    <button id="btn">アクセス</button>
    <div class="err" id="err"></div>
  </div>

  <script>
    // 許可メールアドレスのSHA-256ハッシュ一覧
    const ALLOWED = [
      '5ed40aa06fe4d12f076c720ed98dc14bc12f7c13cd5639a0f8c4ec20c82c77ab', // brendan711@yahoo.co.jp
    ];

    const from = new URLSearchParams(location.search).get('from') || 'index.html';

    async function tryLogin() {
      const val = document.getElementById('email').value.trim().toLowerCase();
      if (!val) return;
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(val));
      const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
      if (ALLOWED.includes(hex)) {
        sessionStorage.setItem('ie_lms_auth', '1');
        location.href = from;
      } else {
        document.getElementById('err').textContent = 'このメールアドレスは登録されていません';
        document.getElementById('email').value = '';
        document.getElementById('email').focus();
      }
    }

    document.getElementById('btn').addEventListener('click', tryLogin);
    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') tryLogin();
    });
  </script>
</body>
</html>
